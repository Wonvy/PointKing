<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PointKing</title>
    <link rel="icon" type="image/svg+xml" href="./assets/pointking-icon.svg" />
    <link rel="stylesheet" href="./styles.css?v=20260704-export-menu-tight" />
  </head>
  <body>
    <input id="fileInput" class="visually-hidden-file" type="file" accept="application/pdf,image/png,image/jpeg,video/mp4" />
    <div class="app">
      <aside class="rail" aria-label="Workspace">
        <div class="brand">
          <span class="mark"><img src="./assets/pointking-icon.svg" alt="" /></span>
          <div>
            <strong id="brandName">PointKing</strong>
            <span id="brandSub"></span>
          </div>
        </div>

        <div class="dropzone document-preview" id="dropzone" aria-live="polite">
          <div class="document-preview-frame" id="railPreviewFrame">
            <img id="railPreviewImage" alt="" />
            <span class="document-preview-empty" id="railPreviewEmpty">
              <i data-lucide="file"></i>
            </span>
          </div>
          <strong id="dropTitle">&#24403;&#21069;&#25991;&#20214;</strong>
          <small id="railPreviewMeta">PointKing</small>
        </div>

        <section class="panel">
          <div class="panel-head">
            <div class="panel-title" id="panelTitle">&#25991;&#20214;</div>
            <button class="new-document-btn panel-new-document-btn" id="newDocumentBtn" type="button">&#26032;&#24314;</button>
          </div>
          <div class="file-list" id="documentList">
            <div class="file-empty">
              <span id="fileName">&#26410;&#36873;&#25321;&#25991;&#20214;</span>
              <small id="fileMeta">PDF, PNG, JPG, MP4</small>
            </div>
          </div>
        </section>
      </aside>

      <div class="resize-handle resize-handle-left" id="leftResizeHandle" role="separator" aria-orientation="vertical" aria-label="&#35843;&#25972;&#24038;&#26639;&#23485;&#24230;">
        <button class="collapse-toggle collapse-toggle-left" id="leftCollapseBtn" title="&#25240;&#21472;&#24038;&#26639;" aria-label="&#25240;&#21472;&#24038;&#26639;">
          <i data-lucide="panel-left-close"></i>
        </button>
      </div>

      <main class="workspace">
        <header class="topbar">
          <div class="document-title">
            <span class="title-brand-mark" aria-hidden="true">
              <img src="./assets/pointking-icon.svg" alt="" />
            </span>
            <div>
              <strong id="docTitle">&#25351;&#28857;&#29579;</strong>
              <span id="docSubtitle"></span>
            </div>
          </div>

          <div class="tools" role="toolbar" aria-label="Annotation tools">
            <button class="tool active" data-tool="select" title="&#36873;&#25321;" aria-label="&#36873;&#25321;">
              <i data-lucide="mouse-pointer-2"></i>
            </button>
            <button class="tool" data-tool="mark" title="&#26631;&#27880;" aria-label="&#26631;&#27880;">
              <i data-lucide="message-square-text"></i>
            </button>
            <button class="tool magnifier-toggle" id="magnifierBtn" title="&#25918;&#22823;&#38236;" aria-label="&#25918;&#22823;&#38236;" aria-pressed="false">
              <i data-lucide="search"></i>
            </button>
          </div>

          <div class="actions">
            <button class="ghost" id="undoBtn" title="&#25764;&#38144;" aria-label="&#25764;&#38144;">
              <i data-lucide="undo-2"></i>
            </button>
            <button class="ghost" id="themeBtn" title="&#20999;&#25442;&#20027;&#39064;" aria-label="&#20999;&#25442;&#20027;&#39064;">
              <i data-lucide="sun"></i>
            </button>
            <button class="ghost" id="languageBtn" title="English" aria-label="Switch language">
              <span id="languageText">EN</span>
            </button>
            <span class="zoom-readout" id="zoomReadout">100%</span>
            <button class="mobile-file-btn" id="mobileFileBtn" type="button">
              <i data-lucide="file-up"></i>
              <span id="mobileFileText">&#36873;&#25321;&#25991;&#20214;</span>
            </button>
            <button class="primary" id="shareBtn">
              <i data-lucide="download"></i>
              <span id="shareText">&#23548;&#20986;</span>
            </button>
          </div>
        </header>

        <section class="canvas-viewport" id="canvasViewport">
          <div class="empty-state" id="emptyState">
            <div class="placeholder" id="placeholder">
              <h1 id="placeholderTitle">&#28155;&#21152;&#25991;&#20214;</h1>
              <p id="placeholderCopy">&#23548;&#20837;&#25991;&#20214;&#25110;&#31896;&#36148;&#22270;&#29255;&#24320;&#22987;&#25209;&#27880;&#12290;</p>
              <div class="placeholder-actions">
                <button class="placeholder-action primary-action" id="placeholderFileBtn" type="button">
                  <span>&#28155;&#21152;&#25991;&#20214;</span>
                </button>
                <button class="placeholder-action" id="placeholderPasteBtn" type="button">
                  <span>&#31896;&#36148;&#22270;&#29255;</span>
                </button>
              </div>
            </div>
          </div>
          <div class="canvas-surface" id="canvasSurface">
            <div class="page-stack" id="pageStack"></div>
          </div>
        </section>

        <footer class="statusbar" id="statusbar" aria-label="Workspace status">
          <span class="statusbar-item">
            <span class="statusbar-label">&#25991;&#20214;</span>
            <strong id="statusFileName">&#26410;&#36873;&#25321;&#25991;&#20214;</strong>
            <span class="statusbar-description" id="statusFileMeta">PDF, PNG, JPG, MP4</span>
          </span>
          <button class="statusbar-icon-toggle" id="detailToggleBtn" type="button" title="&#26174;&#31034;&#35814;&#32454;&#25209;&#27880;" aria-label="&#26174;&#31034;&#35814;&#32454;&#25209;&#27880;" aria-pressed="false">
            <i data-lucide="info"></i>
          </button>
          <span class="statusbar-item">
            <span class="statusbar-label">&#25209;&#27880;</span>
            <strong id="statusCommentCount">0</strong>
          </span>
          <span class="statusbar-item">
            <span class="statusbar-label">&#32553;&#25918;</span>
            <input class="status-zoom-slider" id="statusZoomSlider" type="range" min="35" max="260" value="100" aria-label="&#30011;&#24067;&#32553;&#25918;" />
            <strong id="statusZoom">100%</strong>
          </span>
        </footer>
      </main>

      <div class="resize-handle resize-handle-right" id="rightResizeHandle" role="separator" aria-orientation="vertical" aria-label="&#35843;&#25972;&#21491;&#26639;&#23485;&#24230;">
        <button class="collapse-toggle collapse-toggle-right" id="rightCollapseBtn" title="&#25240;&#21472;&#21491;&#26639;" aria-label="&#25240;&#21472;&#21491;&#26639;">
          <i data-lucide="panel-right-close"></i>
        </button>
      </div>

      <aside class="comments" aria-label="Comments">
        <div class="comments-head">
          <div>
            <span id="commentsTitle">&#25209;&#27880;</span>
            <strong id="commentCount">0</strong>
          </div>
          <button class="ghost compact" id="clearBtn" title="&#28165;&#31354;" aria-label="&#28165;&#31354;">
            <i data-lucide="trash-2"></i>
          </button>
        </div>

        <div class="comment-filters" aria-label="Annotation filters">
          <label class="comment-search">
            <i data-lucide="search"></i>
            <input id="commentSearch" type="search" autocomplete="off" />
          </label>
          <div class="comment-filter-tabs" id="commentFilterTabs" role="tablist" aria-label="Annotation type"></div>
        </div>

        <div class="comment-list" id="commentList"></div>
      </aside>

      <div class="mobile-zoom-control" id="mobileZoomControl" aria-label="&#30011;&#24067;&#32553;&#25918;">
        <input id="mobileZoomSlider" type="range" min="35" max="260" value="100" aria-label="&#30011;&#24067;&#32553;&#25918;" />
      </div>
    </div>

    <script src="./vendor/lucide/lucide.min.js?v=20260704-mobile-logo-collapse"></script>
    <script src="./script.js?v=20260704-mobile-logo-collapse" type="module"></script>
  </body>
</html>
